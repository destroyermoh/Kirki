
<style>

#storyImg{width:80px;height:80px;margin-bottom:20px;opacity:0.85}
#sTitle{color:#e8c87a;font-size:22px;letter-spacing:6px;margin-bottom:6px;font-weight:normal}
#sSub{color:#c8a96e;font-size:10px;letter-spacing:4px;margin-bottom:28px}
#sBody{color:#c8b880;font-size:13px;line-height:2.2;max-width:480px;text-align:center;margin-bottom:32px}
.sbtn{background:transparent;border:1px solid #c8a96e;color:#e8c87a;padding:12px 36px;font-size:12px;cursor:pointer;font-family:Georgia,serif;letter-spacing:3px;pointer-events:all;transition:all 0.2s}
.sbtn:hover{background:#c8a96e22;border-color:#ffd080}
#hitFlash{position:absolute;inset:0;pointer-events:none;opacity:0;background:rgba(180,30,10,0.3);transition:opacity 0.15s}
#atkFlash{position:absolute;inset:0;pointer-events:none;opacity:0;background:rgba(200,160,80,0.08);transition:opacity 0.1s}
#objective{position:absolute;top:16px;right:16px;color:#c8a96e88;font-size:10px;letter-spacing:2px;text-align:right;line-height:1.8}
#compass{position:absolute;top:16px;left:16px;color:#c8a96e88;font-size:10px;letter-spacing:2px}
#waveInfo{position:absolute;top:40px;left:16px;color:#e8c87a;font-size:11px;letter-spacing:1px;opacity:0;transition:opacity 0.5s}
</style>

<canvas id="cv"></canvas>

  <div id="compass"><div id="dirTxt">N</div><div id="zoneTxt">The Ashveld</div></div>

    <circle cx="40" cy="40" r="8" fill="#c8a96e22" stroke="#ffd080" stroke-width="1"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PAGES=[
  {t:"THE VEIL BREATHES",b:"Three hundred years since the last ocean became dust.\n\nThe Veil dissolved itself into the very air — formless, faceless, absolute. Every human who breathes the open sky becomes its vessel. There is no army. There is only humanity, enslaved.",btn:"Continue"},
  {t:"THE DAGGER OF BEFORE",b:"You are Kirki. Born sealed. Lungs untouched by open air.\n\nYour dagger was forged from a falling star before The Veil existed — the only metal that remembers a world without chains. In your hand it hums with the memory of freedom.",btn:"Continue"},
  {t:"THE SHRINE OF AWAKENING",b:"The Sand-Seers whispered a path through the Ashveld.\n\nBreak through The Veil's soldiers. Reach the Shrine of the First Immortal. One awoken immortal can shield ten thousand minds from The Veil's breath.\n\nThe desert holds no mercy. Neither do you.",btn:"Enter the Ashveld"}
];
let pi=0;
const sBody=document.getElementById('sBody');
const sTitle=document.getElementById('sTitle');
const storyBtn=document.getElementById('storyBtn');
const storyDiv=document.getElementById('story');
function showPage(i){const p=PAGES[i];sTitle.textContent=p.t;sBody.textContent=p.b;storyBtn.textContent=p.btn;}
showPage(0);
storyBtn.onclick=()=>{pi++;if(pi>=PAGES.length){storyDiv.style.display='none';init();}else showPage(pi);};

let scene,cam,renderer,clock;
let yaw=0,pitch=0,locked=false;
let mF=false,mB=false,mL=false,mR=false;
let hp=100,stamina=100;
let enemies=[],particles=[];
let atk=0,heavyAtk=0;
let shrine=null,shrineReached=false;
let wave=0,waveEnemies=0;
let combo=0,comboTimer=0;
let gameOver=false,won=false;

let msgT=null;
function showMsg(txt,dur=3500){
  const e=document.getElementById('msg');
  e.textContent=txt;e.style.opacity='1';
  if(msgT)clearTimeout(msgT);
  msgT=setTimeout(()=>e.style.opacity='0',dur);
}

function setWaveInfo(txt,dur=3000){
  const e=document.getElementById('waveInfo');
  e.textContent=txt;e.style.opacity='1';
  setTimeout(()=>e.style.opacity='0',dur);
}

function init(){
  const cv=document.getElementById('cv');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(cv.offsetWidth,cv.offsetHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;

  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x1a0e06,0.018);
  scene.background=new THREE.Color(0x1a0e06);

  cam=new THREE.PerspectiveCamera(72,cv.offsetWidth/cv.offsetHeight,0.1,120);
  cam.position.set(0,1.75,0);
  clock=new THREE.Clock();

  buildSky();
  buildGround();
  buildLights();
  buildEnvironment();
  buildShrine();
  spawnWave(1);
  updateECount();
  animate();

  cv.addEventListener('click',()=>cv.requestPointerLock&&cv.requestPointerLock());
  document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===cv;});
  document.addEventListener('mousemove',e=>{
    if(!locked)return;
    yaw-=e.movementX*0.0022;
    pitch=Math.max(-0.75,Math.min(0.75,pitch-e.movementY*0.0022));
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='w'||e.key==='ArrowUp')mF=true;
    if(e.key==='s'||e.key==='ArrowDown')mB=true;
    if(e.key==='a'||e.key==='ArrowLeft')mL=true;
    if(e.key==='d'||e.key==='ArrowRight')mR=true;
    if(e.key==='e'||e.key==='E'){doLight();}
    if(e.key==='q'||e.key==='Q'){doHeavy();}
  });
  document.addEventListener('keyup',e=>{
    if(e.key==='w'||e.key==='ArrowUp')mF=false;
    if(e.key==='s'||e.key==='ArrowDown')mB=false;
    if(e.key==='a'||e.key==='ArrowLeft')mL=false;
    if(e.key==='d'||e.key==='ArrowRight')mR=false;
  });
  window.addEventListener('resize',()=>{
    const w=cv.offsetWidth,h=cv.offsetHeight;
    renderer.setSize(w,h);cam.aspect=w/h;cam.updateProjectionMatrix();
  });
}

function buildSky(){
  const geo=new THREE.SphereGeometry(90,32,16);
  const mat=new THREE.ShaderMaterial({
    side:THREE.BackSide,
    uniforms:{t:{value:0}},
    vertexShader:`varying vec3 vPos;void main(){vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying vec3 vPos;void main(){
      float y=normalize(vPos).y;
      vec3 top=vec3(0.04,0.02,0.01);
      vec3 mid=vec3(0.55,0.25,0.06);
      vec3 hor=vec3(0.72,0.38,0.12);
      vec3 c=mix(hor,mid,smoothstep(0.,0.15,y));
      c=mix(c,top,smoothstep(0.15,0.7,y));
      float stars=step(0.997,fract(sin(dot(normalize(vPos),vec3(127.1,311.7,74.3)))*43758.5));
      if(y>0.3)c+=stars*vec3(0.9,0.8,0.6)*smoothstep(0.3,0.8,y);
      gl_FragColor=vec4(c,1.);
    }`
  });
  scene.add(new THREE.Mesh(geo,mat));

  for(let i=0;i<6;i++){
    const cg=new THREE.SphereGeometry(4+Math.random()*6,8,6);
    const cm=new THREE.MeshLambertMaterial({color:0x7a3010,transparent:true,opacity:0.25+Math.random()*0.2});
    const c=new THREE.Mesh(cg,cm);
    const a=Math.random()*Math.PI*2,r=30+Math.random()*40;
    c.position.set(Math.cos(a)*r,15+Math.random()*15,Math.sin(a)*r);
    c.scale.set(2,0.5,1.2);
    scene.add(c);
  }
}

function buildGround(){
  const geo=new THREE.PlaneGeometry(200,200,80,80);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    const h=Math.sin(x*0.08)*2.5+Math.cos(z*0.06)*2+Math.sin(x*0.2+z*0.15)*0.8+Math.cos(x*0.35)*0.4;
    pos.setY(i,h);
  }
  geo.computeVertexNormals();
  const mat=new THREE.MeshLambertMaterial({color:0x5a3e20});
  const ground=new THREE.Mesh(geo,mat);
  ground.rotation.x=-Math.PI/2;
  ground.receiveShadow=true;
  scene.add(ground);

  const sandMat=new THREE.MeshLambertMaterial({color:0x8a6030});
  for(let i=0;i<20;i++){
    const r=8+Math.random()*45,a=Math.random()*Math.PI*2;
    const dg=new THREE.SphereGeometry(3+Math.random()*8,10,7);
    const d=new THREE.Mesh(dg,sandMat);
    d.scale.set(1.5+Math.random(),0.3+Math.random()*0.3,1);
    d.position.set(Math.cos(a)*r,-0.5,Math.sin(a)*r);
    d.rotation.y=Math.random()*Math.PI;
    scene.add(d);
  }
}

function buildLights(){
  scene.add(new THREE.AmbientLight(0x5a3820,0.6));
  const sun=new THREE.DirectionalLight(0xff8c30,2.2);
  sun.position.set(40,60,20);
  sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.far=120;
  sun.shadow.camera.left=-50;sun.shadow.camera.right=50;
  sun.shadow.camera.top=50;sun.shadow.camera.bottom=-50;
  scene.add(sun);
  const fill=new THREE.DirectionalLight(0x203060,0.4);
  fill.position.set(-30,20,-40);
  scene.add(fill);
  const rim=new THREE.DirectionalLight(0xc87030,0.8);
  rim.position.set(-20,10,30);
  scene.add(rim);
}

function buildEnvironment(){
  const stoneMat=new THREE.MeshLambertMaterial({color:0x4a3820});
  const darkMat=new THREE.MeshLambertMaterial({color:0x2a1e10});
  const positions=[
    [10,5],[18,-8],[-12,9],[-7,-16],[22,14],[-22,-6],[6,-22],[28,-18],[-28,8],[-14,22],
    [3,30],[-30,15],[25,25],[-5,35],[32,5]
  ];
  positions.forEach(([x,z])=>{
    const h=3+Math.random()*6;
    const w=1.2+Math.random()*1.5;
    const geo=new THREE.BoxGeometry(w,h,w);
    const m=new THREE.Mesh(geo,Math.random()>0.4?stoneMat:darkMat);
    m.position.set(x,h/2-0.5,z);
    m.castShadow=true;
    m.rotation.y=Math.random()*0.3;
    scene.add(m);
    if(Math.random()>0.5){
      const geo2=new THREE.BoxGeometry(w*1.3,h*0.4,w*1.1);
      const m2=new THREE.Mesh(geo2,stoneMat);
      m2.position.set(x,h+0.1,z);
      scene.add(m2);
    }
  });

  for(let i=0;i<8;i++){
    const r=5+i*5,a=i*0.9;
    const torchGeo=new THREE.CylinderGeometry(0.08,0.1,1.2,6);
    const torch=new THREE.Mesh(torchGeo,darkMat);
    torch.position.set(Math.cos(a)*r,0.6,Math.sin(a)*r);
    scene.add(torch);
    const flame=new THREE.PointLight(0xff6010,1.5,6);
    flame.position.set(Math.cos(a)*r,1.5,Math.sin(a)*r);
    scene.add(flame);
    const fGeo=new THREE.SphereGeometry(0.15,6,6);
    const fMat=new THREE.MeshLambertMaterial({color:0xff8020,emissive:0xff4000,emissiveIntensity:2});
    const fMesh=new THREE.Mesh(fGeo,fMat);
    fMesh.position.copy(flame.position);
    scene.add(fMesh);
  }
}

function buildShrine(){
  const shrineGroup=new THREE.Group();
  shrineGroup.position.set(0,0,-40);

  const baseMat=new THREE.MeshLambertMaterial({color:0x6a5030});
  const goldMat=new THREE.MeshLambertMaterial({color:0xc8a050,emissive:0x603010,emissiveIntensity:0.5});
  const glowMat=new THREE.MeshLambertMaterial({color:0xffd080,emissive:0xffa020,emissiveIntensity:3});

  const base=new THREE.Mesh(new THREE.CylinderGeometry(3.5,4,0.5,12),baseMat);
  shrineGroup.add(base);
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    const col=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.35,5,8),baseMat);
    col.position.set(Math.cos(a)*3,2.5,Math.sin(a)*3);
    shrineGroup.add(col);
    const cap=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.3,0.8),goldMat);
    cap.position.set(Math.cos(a)*3,5.15,Math.sin(a)*3);
    shrineGroup.add(cap);
  }
  const roof=new THREE.Mesh(new THREE.ConeGeometry(4,1.5,12),goldMat);
  roof.position.y=6;
  shrineGroup.add(roof);
  const orb=new THREE.Mesh(new THREE.SphereGeometry(0.5,14,12),glowMat);
  orb.position.y=3;
  orb.name='shrineOrb';
  shrineGroup.add(orb);
  const shrineLight=new THREE.PointLight(0xffd060,4,15);
  shrineLight.position.y=3;
  shrineGroup.add(shrineLight);

  shrineGroup.castShadow=true;
  scene.add(shrineGroup);
  shrine=shrineGroup;
}

const ENEMY_NAMES=["Veil Soldier","Ashen Warden","Bound Specter","Sand Thrall","Veil Enforcer"];

function spawnWave(n){
  wave=n;
  const count=[0,4,6,8][Math.min(n,3)];
  waveEnemies=count;
  const radius=12+n*2;
  for(let i=0;i<count;i++){
    const a=(i/count)*Math.PI*2+Math.random()*0.5;
    spawnEnemy(Math.cos(a)*radius,Math.sin(a)*radius,n);
  }
  setWaveInfo(`WAVE ${n} — ${count} ENEMIES`,3500);
  updateECount();
}

function spawnEnemy(x,z,tier=1){
  const g=new THREE.Group();
  const c=tier>=3?0x6a1010:tier===2?0x2a1a0e:0x1e1408;
  const bodyMat=new THREE.MeshLambertMaterial({color:c});
  const eyeC=tier>=3?0xff2020:0xcc2010;
  const eyeMat=new THREE.MeshLambertMaterial({color:eyeC,emissive:eyeC,emissiveIntensity:2});
  const armMat=new THREE.MeshLambertMaterial({color:0x3a2810});

  const torso=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.9,0.45),bodyMat);
  torso.position.y=1.15;torso.castShadow=true;g.add(torso);
  const head=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.45),bodyMat);
  head.position.y=1.9;g.add(head);
  const eye1=new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),eyeMat);
  eye1.position.set(0.12,1.97,0.2);g.add(eye1);
  const eye2=new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),eyeMat);
  eye2.position.set(-0.12,1.97,0.2);g.add(eye2);
  const lArm=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.75,0.22),armMat);
  lArm.position.set(0.48,1.1,0);g.add(lArm);
  const rArm=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.75,0.22),armMat);
  rArm.position.set(-0.48,1.1,0);g.add(rArm);
  const legs=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,0.4),bodyMat);
  legs.position.y=0.4;g.add(legs);

  const ehp=tier*3+2;
  g.position.set(x,0,z);
  g.userData={hp:ehp,maxHp:ehp,state:'patrol',tier,
    patrolAngle:Math.random()*Math.PI*2,patrolR:x,patrolZ:z,
    alertTimer:0,attackTimer:0,bobT:Math.random()*10,
    name:ENEMY_NAMES[Math.floor(Math.random()*ENEMY_NAMES.length)]};
  scene.add(g);
  enemies.push(g);
}

function updateECount(){
  document.getElementById('eCount').textContent=enemies.length;
}

function doLight(){
  if(gameOver||won)return;
  if(atk>0)return;
  if(stamina<15)return;
  stamina=Math.max(0,stamina-15);
  atk=0.45;
  combo++;comboTimer=2;
  const af=document.getElementById('atkFlash');
  af.style.opacity='1';setTimeout(()=>af.style.opacity='0',80);

  const fwd=new THREE.Vector3(-Math.sin(yaw)*Math.cos(pitch),0,-Math.cos(yaw)*Math.cos(pitch));
  let hit=false;
  enemies.forEach(e=>{
    if(e.userData.hp<=0)return;
    const d=cam.position.distanceTo(e.position);
    if(d>3.8)return;
    const toE=e.position.clone().sub(cam.position);toE.y=0;toE.normalize();
    if(fwd.dot(toE)<0.45)return;
    const dmg=combo>=3?8:4;
    e.userData.hp-=dmg;
    hit=true;
    spawnBlood(e.position.clone().add(new THREE.Vector3(0,1.5,0)));
    showEnemyHp(e);
    if(e.userData.hp<=0)killEnemy(e);
    else{e.userData.state='chase';e.userData.alertTimer=10;}
  });
  if(!hit&&shrine&&!shrineReached){
    const sd=cam.position.distanceTo(shrine.position);
    if(sd<5){activateShrine();return;}
  }
  if(hit&&combo>=3){showMsg(`COMBO x${combo}!`,1200);}
}

function doHeavy(){
  if(gameOver||won)return;
  if(heavyAtk>0)return;
  if(stamina<35)return;
  stamina=Math.max(0,stamina-35);
  heavyAtk=0.9;combo=0;
  const af=document.getElementById('atkFlash');
  af.style.opacity='1';setTimeout(()=>af.style.opacity='0',150);
  let hit=0;
  const fwd=new THREE.Vector3(-Math.sin(yaw)*Math.cos(pitch),0,-Math.cos(yaw)*Math.cos(pitch));
  enemies.forEach(e=>{
    if(e.userData.hp<=0)return;
    const d=cam.position.distanceTo(e.position);
    if(d>5)return;
    const toE=e.position.clone().sub(cam.position);toE.y=0;toE.normalize();
    if(fwd.dot(toE)<0.3)return;
    e.userData.hp-=12;hit++;
    spawnBlood(e.position.clone().add(new THREE.Vector3(0,1.5,0)));
    showEnemyHp(e);
    if(e.userData.hp<=0)killEnemy(e);
    else{e.userData.state='chase';e.userData.alertTimer=10;}
  });
  if(hit>0)showMsg(`HEAVY STRIKE — ${hit} HIT${hit>1?'S':''}`,1500);
}

function showEnemyHp(e){
  const bar=document.getElementById('enemyHp');
  const fill=document.getElementById('enemyFill');
  const name=document.getElementById('enemyName');
  bar.style.display='flex';
  name.textContent=e.userData.name.toUpperCase();
  fill.style.width=Math.max(0,e.userData.hp/e.userData.maxHp*100)+'%';
  clearTimeout(bar._t);
  bar._t=setTimeout(()=>bar.style.display='none',2500);
}

function killEnemy(e){
  spawnBlood(e.position.clone().add(new THREE.Vector3(0,1,0)),16);
  scene.remove(e);
  enemies=enemies.filter(x=>x!==e);
  updateECount();
  if(enemies.length===0){
    if(wave<3){
      setTimeout(()=>{spawnWave(wave+1);},2000);
      showMsg(`Wave ${wave} cleared. More come.`,2000);
    } else {
      showMsg("All soldiers fall. The path to the shrine opens.",3000);
    }
  }
}

function spawnBlood(pos,count=8){
  for(let i=0;i<count;i++){
    const geo=new THREE.SphereGeometry(0.05+Math.random()*0.06,4,4);
    const mat=new THREE.MeshLambertMaterial({color:0x8a1a08});
    const m=new THREE.Mesh(geo,mat);
    m.position.copy(pos);
    m.userData.vel=new THREE.Vector3((Math.random()-0.5)*5,(Math.random()+0.3)*4,(Math.random()-0.5)*5);
    m.userData.life=0.8+Math.random()*0.4;
    scene.add(m);
    particles.push(m);
  }
}

function activateShrine(){
  if(shrineReached)return;
  shrineReached=true;
  won=true;
  spawnParticles(shrine.position.clone().add(new THREE.Vector3(0,3,0)),0xffd080,30);
  setTimeout(()=>{
    showMsg("THE FIRST IMMORTAL STIRS. The Veil screams across the dunes.",6000);
  },500);
  setTimeout(()=>{
    showMsg("Kirki — six more remain. The prophecy has begun.",6000);
  },4500);
}

function spawnParticles(pos,color,count=12){
  for(let i=0;i<count;i++){
    const geo=new THREE.SphereGeometry(0.08,4,4);
    const mat=new THREE.MeshLambertMaterial({color,emissive:color,emissiveIntensity:1.5});
    const m=new THREE.Mesh(geo,mat);
    m.position.copy(pos);
    m.userData.vel=new THREE.Vector3((Math.random()-0.5)*6,(Math.random()+0.5)*5,(Math.random()-0.5)*6);
    m.userData.life=1.2+Math.random()*0.5;
    scene.add(m);
    particles.push(m);
  }
}

function updateEnemies(dt){
  const cp=cam.position;
  enemies.forEach(e=>{
    if(e.userData.hp<=0)return;
    const toP=cp.clone().sub(e.position);toP.y=0;
    const dist=toP.length();
    e.userData.bobT+=dt*2.5;
    e.children.forEach(c=>{if(c.geometry&&c.geometry.type==='SphereGeometry'&&c.position.y>1.8)c.material.emissiveIntensity=1.5+Math.sin(e.userData.bobT*3)*0.8;});

    if(dist<20&&e.userData.state!=='chase'){e.userData.state='chase';e.userData.alertTimer=15;}
    if(e.userData.alertTimer>0)e.userData.alertTimer-=dt;
    else if(e.userData.alertTimer<=0&&e.userData.state==='chase')e.userData.state='patrol';

    if(e.userData.state==='chase'&&dist>0.1){
      const spd=1.8+e.userData.tier*0.4;
      toP.normalize().multiplyScalar(spd*dt);
      e.position.add(toP);
      e.lookAt(new THREE.Vector3(cp.x,e.position.y,cp.z));
      e.userData.attackTimer=Math.max(0,e.userData.attackTimer-dt);
      if(dist<1.6&&e.userData.attackTimer<=0){
        const dmg=e.userData.tier*4+2;
        hp=Math.max(0,hp-dmg);
        document.getElementById('hpFill').style.width=hp+'%';
        const hf=document.getElementById('hitFlash');
        hf.style.opacity='1';setTimeout(()=>hf.style.opacity='0',180);
        e.userData.attackTimer=1.2;
        if(hp<=0&&!gameOver){gameOver=true;showMsg("The desert swallows Kirki. The Veil endures.",99999);}
      }
    } else {
      e.userData.patrolAngle+=dt*(0.3+Math.random()*0.05);
      const pr=Math.abs(e.userData.patrolR)||10;
      const tx=Math.cos(e.userData.patrolAngle)*pr;
      const tz=Math.sin(e.userData.patrolAngle)*pr;
      const toT=new THREE.Vector3(tx-e.position.x,0,tz-e.position.z);
      if(toT.length()>0.5){toT.normalize().multiplyScalar(1.0*dt);e.position.add(toT);}
      e.lookAt(new THREE.Vector3(tx,e.position.y,tz));
    }
    e.position.y=0;
  });
}

function updateParticles(dt){
  particles=particles.filter(p=>{
    p.userData.life-=dt*1.8;
    p.userData.vel.y-=8*dt;
    p.position.addScaledVector(p.userData.vel,dt);
    if(p.userData.life<=0){scene.remove(p);return false;}
    return true;
  });
}

function checkShrine(){
  if(!shrine||shrineReached||enemies.length>0)return;
  const d=cam.position.distanceTo(shrine.position);
  document.getElementById('interactHint').style.opacity=d<5?'1':'0';
}

function updateHUD(){
  document.getElementById('hpFill').style.width=hp+'%';
  document.getElementById('stmFill').style.width=Math.round(stamina)+'%';
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  document.getElementById('dirTxt').textContent=dirs[Math.round((-yaw/(Math.PI*2)*8+8))%8];
  const x=cam.position.x,z=cam.position.z;
  let zone='The Ashveld';
  if(Math.abs(x)<8&&z<-28)zone='The Shrine Path';
  else if(z<-20)zone='The Cinder Reach';
  else if(x>18)zone='The Pale Flats';
  else if(x<-18)zone='The Hollow West';
  document.getElementById('zoneTxt').textContent=zone;
  document.getElementById('r1').className='rune'+(atk<=0?' ready':'');
  document.getElementById('r2').className='rune'+(heavyAtk<=0?' ready':'');
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);

  cam.rotation.order='YXZ';
  cam.rotation.y=yaw;
  cam.rotation.x=pitch;

  if(!gameOver&&!won){
    const spd=4.2;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    const moving=mF||mB||mL||mR;
    if(mF)cam.position.addScaledVector(fwd,spd*dt);
    if(mB)cam.position.addScaledVector(fwd,-spd*dt);
    if(mL)cam.position.addScaledVector(right,-spd*dt);
    if(mR)cam.position.addScaledVector(right,spd*dt);
    cam.position.clamp(new THREE.Vector3(-55,1.75,-55),new THREE.Vector3(55,1.75,55));
    cam.position.y=1.75+Math.sin(Date.now()*0.004)*0.04*(moving?1:0);
    stamina=Math.min(100,stamina+(moving?-8:18)*dt);
    atk=Math.max(0,atk-dt);
    heavyAtk=Math.max(0,heavyAtk-dt);
    comboTimer=Math.max(0,comboTimer-dt);
    if(comboTimer<=0)combo=0;
  }

  if(shrine){
    const orb=shrine.getObjectByName('shrineOrb');
    if(orb){orb.position.y=3+Math.sin(Date.now()*0.002)*0.2;orb.rotation.y+=dt*0.8;}
  }

  updateEnemies(dt);
  updateParticles(dt);
  checkShrine();
  updateHUD();
  renderer.render(scene,cam);
}
</script>
